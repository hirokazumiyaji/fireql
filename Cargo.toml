[package]
name = "fireql"
version = "0.1.0"
edition = "2021"

[dependencies]
firestore = "0.48"
gcloud-sdk = "0.29"
sqlparser = "0.61"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.6", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }
rustls = { version = "0.23", features = ["ring"] }
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }
